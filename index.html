<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />
    <meta name="theme-color" content="#1F3A5F" />
    <meta name="google-site-verification" content="JZ1Y9ih_UQhVUahGizhPIHK4DF13gp-Q8Zn_vkxUmc0" />

    <!-- Titre : onglet du navigateur + titre bleu dans Google -->
    <title>TravailMap France — Où s'installer pour trouver du travail</title>

    <!-- Description : paragraphe gris sous le titre dans Google -->
    <meta
      name="description"
      content="Carte interactive de la France qui note chaque ville selon les opportunités d'emploi, la tension du marché, les salaires estimés et le coût du logement."
    />
    <link rel="canonical" href="https://travailmap-france.vercel.app/" />

    <!-- Aperçu au partage du lien (WhatsApp, LinkedIn, Facebook…) -->
    <meta property="og:title" content="TravailMap France" />
    <meta
      property="og:description"
      content="Trouvez les villes françaises où le marché du travail est le plus favorable."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://travailmap-france.vercel.app/" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Aperçu sur X / Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TravailMap France" />
    <meta
      name="twitter:description"
      content="Trouvez les villes françaises où le marché du travail est le plus favorable."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
